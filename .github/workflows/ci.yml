name: CI

on:
  push:
    branches: [ main, refactor/sot ]
  pull_request:
    branches: [ main ]

jobs:
  policy:
    runs-on: ubuntu-latest
    env:
      ZINDIAN_DISABLE_NETWORK: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Verify pinned requirements exists and is up-to-date
        run: |
          if [ ! -f requirements.txt ]; then
            echo "requirements.txt missing"; exit 1; fi
          if [ -f requirements.in ] && [ requirements.txt -ot requirements.in ]; then
            echo "requirements.txt is older than requirements.in — please run pip-compile"; exit 1; fi
          echo "requirements.txt verification passed"
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run SoT policy checks
        run: |
          pytest -q \
            tests/test_challenge_config_write_policy.py \
            tests/test_cv_policy.py \
            tests/test_cross_skill_policy.py \
            tests/test_skill_state_safe_access.py \
            tests/test_oof_schema.py \
            tests/test_fetch_guard.py

      - name: Verify requirements lockfile is current
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools
          pip-compile --output-file /tmp/expected_requirements.txt requirements.in
          if ! cmp -s requirements.txt /tmp/expected_requirements.txt; then
            echo "requirements.txt is out of date. Run: pip-compile requirements.in --output-file=requirements.txt" >&2
            diff -u requirements.txt /tmp/expected_requirements.txt || true
            exit 1
          fi
          echo "requirements.txt is up-to-date"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]
    env:
      ZINDIAN_DISABLE_NETWORK: "1"

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -q
